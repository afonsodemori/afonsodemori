<!DOCTYPE html>
<html lang="en">
<head>
    <title>afonso.dev</title>

    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url=/en">

    <!-- le opengraph tags -->
    <meta property="og:type" content="profile">
    <meta property="profile:first_name" content="Afonso">
    <meta property="profile:last_name" content="de Mori">
    <meta property="profile:gender" content="male">
    <meta property="og:title" content="Afonso de Mori A. Silva - Software developer - Madrid, Spain">
    <meta property="og:description" content="Afonso de Mori Ayres da Silva's personal profile. Back-end web developer PHP focused">
    <meta property="og:image" content="https://afonso.dev/assets/images/photo-og.jpg">
</head>
<body>
<noscript>
    <ul>
        <li><a href="/en">English</a></li>
        <li><a href="/es">Español</a></li>
        <li><a href="/pt">Português</a></li>
    </ul>
</noscript>
<script>
    // Script to be included in language selection pages (/index.html, /cv/index.html, /contact/index.html, /courses/index.html)
    const getLocale = () => {
        if (localStorage.getItem('locale') !== null) return localStorage.getItem('locale');
        for (let language, i = 0; i < navigator.languages.length; i++)
            if (['en', 'es', 'pt'].includes(language = navigator.languages[i].split('-').shift())) return language;
        return 'en';
    }
    let url = new URL(window.location);
    url.pathname = `${url.pathname}/${getLocale()}`.replaceAll('//', '/');
    window.location = url;
</script>
</body>
</html>
