name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - develop
      - oven

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Copy assets
        run: |
          mkdir -pv dist/assets/pdfjs
          cp -rv resources/* dist/
          cp node_modules/pdfjs-dist/build/pdf.min.mjs dist/assets/pdfjs/pdf.min.mjs
          cp node_modules/pdfjs-dist/build/pdf.worker.min.mjs dist/assets/pdfjs/pdf.worker.min.mjs

      - name: Build
        run: npm run build

      - name: Tag with version
        run: |
          {
            echo '<!DOCTYPE html><html lang="en">'
            echo '<head><meta name="viewport" content="width=device-width, initial-scale=1"><title></title></head>'
            echo '<body>'
            echo '<h1>OK</h1>'
            echo "<p>${GITHUB_REF##*/}@$(echo ${GITHUB_SHA} | head -c7)</p>"
            echo "<address>$(date)</address>"
            echo '</body></html>'
          } > dist/health-check.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v2
        with:
          name: dist
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v2
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: afonso
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
