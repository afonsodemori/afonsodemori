name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop
      - oven

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Run SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Uncomment the following lines if you wish to fail your job when the Quality Gate is red.
      # This would typically be used to fail a deployment.
      # - name: Quality Gate
      #   uses: sonarsource/sonarqube-quality-gate-action@master
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    runs-on: ubuntu-latest
    container:
      image: afonsodemori/afonso-dev:latest

    needs: sonar

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set CACHE_HASH
        run: echo "CACHE_HASH=$(echo ${GITHUB_SHA} | head -c7)" >> $GITHUB_ENV

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache
          key: ${{ runner.os }}-build-${{ env.CACHE_HASH }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Install Dependencies
        run: make ci

      - name: Install Assets
        run: make assets
        env:
          CACHE_HASH: ${{ env.CACHE_HASH }}

      - name: Generate Pages
        run: make pages
        env:
          CACHE_HASH: ${{ env.CACHE_HASH }}

      - name: Generate Shortcuts
        run: make shortcuts

      - name: Import Resumes
        run: make resumes

      - name: Create Health Check File
        run: |
          {
            echo '<!DOCTYPE html><html lang="en">'
            echo '<head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Health Check</title></head>'
            echo '<body>'
            echo '<h1>OK</h1>'
            echo "<p>${GITHUB_REF##*/}@${CACHE_HASH}</p>"
            echo "<address>$(date)</address>"
            echo '</body></html>'
          } > dist/health-check.html

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v2
        with:
          name: dist
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v2
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: afonso
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
